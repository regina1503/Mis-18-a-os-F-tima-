<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis 18 años Fátima 🪩</title>
    
    <!-- Metatags -->
    <meta property="og:title" content="Mis 18 años Fátima 🪩">
    <meta property="og:description" content="¡Estás invitado a mi fiesta de 18 años! No faltes.">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Arial', sans-serif; overflow-x: hidden; margin: 0; padding: 0; }
        
        .disco-ball { font-size: 96px; animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .section { width: 100vw; position: relative; opacity: 0; transform: translateY(50px); transition: all 1s ease-out; }
        .section.visible { opacity: 1; transform: translateY(0); }
        .img-fluid { width: 100%; display: block; }
        
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #000428, #004e92); 
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: all 1s ease-out; 
        }
        
        .nombre-fatima { 
            font-family: 'Great Vibes', cursive; font-size: 5rem; color: #fff; 
            text-shadow: 0 0 20px #00d4ff, 0 0 30px #00d4ff; 
            margin-bottom: 0.5rem;
        }
        
        .btn-base { 
            position: absolute; left: 50%; transform: translate(-50%, -50%);
            background: #001e5e; color: white; padding: 15px 30px; border-radius: 9999px; 
            font-weight: 700; font-size: 1.05rem; box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
            transition: transform 0.3s ease; display: flex; align-items: center; 
            justify-content: center; text-decoration: none; white-space: nowrap; min-width: 140px;
        }
        .btn-base:hover { transform: translate(-50%, -50%) scale(1.05); }

        .sparkle {
            position: absolute; width: 8px; height: 8px; background: white; border-radius: 50%;
            pointer-events: none; animation: twinkle 1.5s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        #countdown {
            position: absolute; top: 54%; left: 50%; transform: translate(-50%, -50%);
            display: flex; gap: 10px; text-align: center; font-weight: bold; font-size: 0.9rem;
            width: 90%; justify-content: center; color: #001e5e;
        }
        .circle-num {
            width: 45px; height: 45px; border: 2px solid #001e5e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; margin-bottom: 5px; color: #001e5e; font-weight: 800;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://github.com/regina1503/Mis-18-a-os-F-tima-/raw/main/Aitana%20-%20SUPERESTRELLA%20Letra%20__%20cancion%20de%20la%20copa%20mundial%202026.mp3" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <div class="disco-ball mb-6">🪩</div>
        <div class="nombre-fatima">Fátima</div>
        <h1 class="text-white font-montserrat text-2xl mb-8">Mis 18 Años</h1>
        <button id="openBtn" class="bg-blue-600 px-10 py-4 rounded-full font-bold text-xl hover:scale-110 transition-transform shadow-lg animate-pulse border-2 border-white text-white">
            Abrir Invitación ✉️
        </button>
    </div>

    <div class="section">
        <img src="https://raw.githubusercontent.com/INVITACIONESMOMENTOSENCANTADOS/Mis-18-a-os-F-tima-/main/1_20260709_164104_0000.jpg" class="img-fluid" alt="Página 1">
    </div>

    <div class="section">
        <img src="https://raw.githubusercontent.com/INVITACIONESMOMENTOSENCANTADOS/Mis-18-a-os-F-tima-/main/2.jpg" class="img-fluid" alt="Página 2">
        <!-- Botón centrado -->
        <a href="https://maps.app.goo.gl/KBrbisj2KjB7giyW7?g_st=ac" target="_blank" class="btn-base" style="top: 70%; left: 50%;">
           💙 Ver Ubicación
        </a>
    </div>

    <div class="section">
        <img src="https://raw.githubusercontent.com/regina1503/Mis-18-a-os-F-tima-/main/2%20(2)_20260709_164105_0002.jpg" class="img-fluid" alt="Página 3">
        
        <a href="confirmar.html" class="btn-base" style="top: 39%;">
           Confirmar
        </a>

        <div id="countdown">
            <div class="flex flex-col items-center"><div class="circle-num"><span id="dias">0</span></div>Días</div>
            <div class="flex flex-col items-center"><div class="circle-num"><span id="horas">0</span></div>Hrs</div>
            <div class="flex flex-col items-center"><div class="circle-num"><span id="minutos">0</span></div>Min</div>
            <div class="flex flex-col items-center"><div class="circle-num"><span id="segundos">0</span></div>Seg</div>
        </div>
    </div>

    <script>
        // Animaciones de scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.section').forEach(s => observer.observe(s));

        // Lógica de brillos
        function createSparkle() {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 300 + 'vh';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1500);
        }
        setInterval(createSparkle, 300);

        const audio = document.getElementById('bgMusic');
        const overlay = document.getElementById('overlay');
        document.getElementById('openBtn').addEventListener('click', () => {
            audio.play();
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1000);
        });

        const fechaEvento = new Date('2026-07-25T20:00:00').getTime();
        function update() {
            const now = new Date().getTime();
            const diff = fechaEvento - now;
            document.getElementById('dias').innerText = Math.floor(diff / (1000*60*60*24));
            document.getElementById('horas').innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            document.getElementById('minutos').innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
            document.getElementById('segundos').innerText = Math.floor((diff % (1000*60)) / 1000);
        }
        setInterval(update, 1000);
    </script>
</body>
</html>
